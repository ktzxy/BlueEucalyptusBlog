baseURL = 'https://ktzxy.top/'
languageCode = 'en-us'
title = "Blue Eucalyptus's Blog"
theme = "hugo-PaperMod"

# 输出 JSON 用于搜索
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Atticus Wilde"
  enableThemeToggle = true   # 夜间模式开关
  enableFontSize = true      # 字号切换
  showReadingTime = true     # 阅读时长显示

  # Fuse.js 搜索选项
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 1
    keys = ["title", "permalink", "summary", "content"]

# 菜单
[menu]

  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 2

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3