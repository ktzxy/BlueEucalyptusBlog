baseURL = 'https://ktzxy.top/'
languageCode = "zh-cn"
title = "Blue Eucalyptus's Blog"
copyright = "[©2024 Blue Eucalyptus's Blog](https://ktzxy.top/)"
theme = "PaperMod"


# 输出 JSON 用于搜索
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Atticus Wilde"
  enableThemeToggle = true   # 夜间模式开关
  enableFontSize = true      # 字号切换
  showReadingTime = true     # 阅读时长显示
  disableIntegrity = true    # 关闭 SRI 验证
  disableLiveReload = true

  enableInlineShortcodes = true # shortcode，类似于模板变量，可以在写 markdown 的时候便捷地插入，官方文档中有一个视频讲的很通俗
  hasCJKLanguage = true # 是否有 CJK 的字符
  enableRobotsTXT = true # 允许生成 robots.txt
  buildDrafts = false # 构建时是否包括草稿
  buildFuture = false # 构建未来发布的内容
  buildExpired = false # 构建过期的内容
  enableEmoji = true # 允许 emoji
  pygmentsUseClasses = true

  # Fuse.js 搜索选项
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 1
    keys = ["title", "permalink", "summary", "content"]


# 菜单
[menu]

  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 2

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3