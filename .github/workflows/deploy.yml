name: Deploy Hugo to Alibaba Cloud (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2️⃣ 缓存 Hugo 资源
      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: |
            resources
            .hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/config.*') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      # 3️⃣ 安装 Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.157.0"
          extended: true

      # 4️⃣ 构建站点
      - name: Build Hugo site
        run: hugo --minify --cleanDestinationDir -D

      - name: List theme folder
        run: ls -R themes/PaperMod

      - name: Print Hugo environment
        run: hugo env

      - name: Verify Hugo output
        run: |
          ls -l public
          if [ ! -f public/index.html ]; then
            echo "Error: index.html not generated"
            exit 1
          fi

      # 5️⃣ 同步 public 到服务器
      - name: Rsync to server
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          path: public/
          remote_host: ${{ secrets.ALI_HOST }}
          remote_user: ${{ secrets.ALI_USER }}
          remote_port: ${{ secrets.ALI_PORT }}
          remote_path: /var/www/myblog/public/
          remote_key: ${{ secrets.ALI_KEY }}

      # 6️⃣ 远程重启 Docker 容器
      - name: Restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALI_HOST }}
          username: ${{ secrets.ALI_USER }}
          key: ${{ secrets.ALI_KEY }}
          port: ${{ secrets.ALI_PORT }}
          script: |
            cd /var/www/myblog
            docker compose up -d --force-recreate
